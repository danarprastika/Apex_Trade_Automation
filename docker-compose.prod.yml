services:
  postgres:
    image: postgres:16
    container_name: apex-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - apex_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: apex-redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - apex_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: apex-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
      BINANCE_TESTNET_URL: ${BINANCE_TESTNET_URL:-https://testnet.binance.vision/api}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      OLLAMA_API_URL: ${OLLAMA_API_URL:-http://ollama:11434}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      IS_LIVE_TRADING: ${IS_LIVE_TRADING:-false}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    networks:
      - apex_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    volumes:
      - ./logs/backend:/app/logs

  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: apex-telegram
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_URL: http://backend:8000
      API_BASE_URL: http://backend:8000
    command: python bot.py
    networks:
      - apex_net
    volumes:
      - ./logs/telegram:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apex-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - apex_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  ciso-dashboard:
    build:
      context: ./ciso-dashboard
      dockerfile: Dockerfile
    container_name: apex-ciso
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://apex:apex_password@postgres:5432/apex_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    networks:
      - apex_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost', 8501), 5); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  web-gateway:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      ciso-dashboard:
        condition: service_healthy
    networks:
      - apex_net

volumes:
  postgres-data:
  redis-data:

networks:
  apex_net:
    driver: bridge